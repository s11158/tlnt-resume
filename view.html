<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Резюме · TLNT.AE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--graphite:#2E2A26;--ink:#3A352F;--muted:#7A7065;--beige:#B08D57;--beige-deep:#9A7842;
  --line:#E7DECF;--bg:#F3EDE3;--bg2:#ECE3D5;--shadow:0 12px 40px rgba(46,42,38,.12)}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Roboto',system-ui,Segoe UI,sans-serif;color:var(--ink);
  background:linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh}
.bar{max-width:840px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:18px 22px}
.logo-mark{font-weight:700;letter-spacing:2.5px;font-size:20px;color:var(--graphite);border:2px solid var(--graphite);padding:6px 11px;border-radius:8px}
.logo-mark .dot{color:var(--beige)}
button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:14px;font-weight:500;background:var(--graphite);color:#fff;padding:12px 20px}
button:hover{background:#1f1c19}
.stage{max-width:840px;margin:0 auto 60px;padding:0 22px}
.page{background:#fff;color:#2E2A26;width:100%;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);
  overflow:hidden;padding:6% 6.5%;font-size:15px;position:relative;min-height:1000px}
.p-mast{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1.4px solid var(--beige);padding-bottom:2.6%}
.p-logo{font-weight:700;letter-spacing:.1em;font-size:1.7em;color:var(--graphite)}.p-logo .dot{color:var(--beige)}
.p-tag{font-size:.68em;letter-spacing:.26em;text-transform:uppercase;color:var(--beige-deep);text-align:right;line-height:1.5;margin-top:.3em}
.p-logo-img{max-height:3.2em;max-width:42%;object-fit:contain}
.p-headrow{display:flex;gap:4%;align-items:flex-start;margin-top:3.5%}
.p-headmain{flex:1;min-width:0}.p-photowrap{flex:0 0 21%}
.p-photo{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:4px;border:1px solid var(--line)}
.p-name{font-size:1.95em;font-weight:700;color:var(--graphite);line-height:1.08}
.p-head{font-size:1em;color:var(--muted);margin-top:.4%}
.p-contacts{font-size:.82em;color:var(--ink);margin-top:2%;line-height:1.6}
.p-contacts span{color:var(--beige-deep);margin:0 .4em}
.p-personal{font-size:.76em;color:var(--muted);margin-top:1.6%;line-height:1.5}
.p-sec{margin-top:3.4%}
.p-sec h3{font-size:.82em;letter-spacing:.14em;text-transform:uppercase;color:var(--beige-deep);font-weight:700;margin:0 0 1.2%;display:flex;align-items:center;gap:.7em}
.p-sec h3::after{content:"";flex:1;height:1px;background:var(--line)}
.p-sec .body{font-size:.9em;line-height:1.45;color:var(--ink)}
.p-sec .li{display:flex;gap:.5em;margin:.12em 0}.p-sec .li::before{content:"•";color:var(--beige)}
.p-sec .sp{height:.4em}
.p-foot{margin-top:5%;border-top:1px solid var(--line);padding-top:1.4%;display:flex;justify-content:space-between;font-size:.72em;color:var(--muted)}
.err{max-width:520px;margin:80px auto;text-align:center;color:var(--muted)}
.err a{color:var(--beige-deep)}
</style>
</head>
<body>
<div class="bar">
  <div class="logo-mark">TLNT<span class="dot">.</span>AE</div>
  <button id="dl" style="display:none">⬇ Скачать PDF</button>
</div>
<div class="stage"><div class="page" id="page"></div></div>
<div class="err" id="err" style="display:none">
  <h2>Резюме не найдено</h2>
  <p>Ссылка повреждена или пуста. Создайте резюме в <a href="index.html">TLNT.AE Resume Formatter</a>.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="app.js?v=4"></script>
<script>
const hash=decodeURIComponent(location.hash.replace(/^#/,""));
const data=hash?TLNT.decodePayload(hash):null;
if(!data){ document.querySelector("#page").style.display="none"; document.querySelector("#stage")&&0; document.querySelector(".stage").style.display="none"; document.querySelector("#err").style.display="block"; }
else{
  TLNT.renderPreview(document.querySelector("#page"), data);
  document.title=(data.name||"Резюме")+" · TLNT.AE";
  const btn=document.querySelector("#dl"); btn.style.display="inline-block";
  btn.onclick=()=>{ btn.textContent="Готовлю…"; TLNT.downloadResumePdf(data).then(()=>btn.textContent="⬇ Скачать PDF").catch(e=>{btn.textContent="Ошибка";console.error(e);}); };
  TLNT.ensureFonts().catch(()=>{});
}
</script>
</body>
</html>
